name: IFCQuickLook
options:
  bundleIdPrefix: jp.trapple
  createIntermediateGroups: true
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: arm64                         # libweb-ifc.a が arm64 のみのため（universal 配布時は lib 側も universal 化が必要）
    SWIFT_VERSION: "5.0"                 # 言語モード5（strict concurrency を強制しない）
    CLANG_CXX_LANGUAGE_STANDARD: c++20
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/.webifc/include
    LIBRARY_SEARCH_PATHS:
      - $(PROJECT_DIR)/.webifc/lib
    OTHER_LDFLAGS: ["-lweb-ifc"]
    SWIFT_OBJC_BRIDGING_HEADER: Bridge/IFCQuickLook-Bridging-Header.h
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"              # ローカル ad-hoc。配布時に Developer ID へ
    GENERATE_INFOPLIST_FILE: YES         # Info.plist 未指定ターゲット（tool/test）用
schemes:
  IFCQuickLook:
    build:
      targets:
        IFCQuickLook: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [IFCCoreTests]
targets:
  IFCQuickLook:
    type: application
    platform: macOS
    sources:
      - App
      - Shared
      - Bridge/WebIFCBridge.h
      - Bridge/WebIFCBridge.mm
    info:
      path: App/App-Info.plist
      properties:
        NSPrincipalClass: NSApplication
        CFBundleDocumentTypes:
          - CFBundleTypeName: IFC Building Model
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.buildingsmart.ifc]
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.buildingsmart.ifc
            UTTypeDescription: IFC Building Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [ifc]
    # ホストアプリは非サンドボックス（App Store 外配布・開発用ビューアで任意パスを開くため）。
    # QL 拡張（IFCPreview）側はサンドボックス必須なので維持。
    dependencies:
      - target: IFCPreview
        embed: true
  IFCPreview:
    type: app-extension
    platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.trapple.IFCQuickLook.IFCPreview
    sources:
      - PreviewExtension
      - Shared
      - Bridge/WebIFCBridge.h
      - Bridge/WebIFCBridge.mm
    info:
      path: PreviewExtension/PreviewExtension-Info.plist
      properties:
        CFBundleDisplayName: IFC Preview
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - org.buildingsmart.ifc
            QLSupportsSearchableItems: false
    entitlements:
      path: PreviewExtension/PreviewExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
  ifcql-bench:
    type: tool
    platform: macOS
    sources:
      - Bench
      - Shared
      - Bridge/WebIFCBridge.h
      - Bridge/WebIFCBridge.mm
  IFCCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes: ["Fixtures/**"]
      - path: Tests/Fixtures
        buildPhase: resources
      - Shared
      - Bridge/WebIFCBridge.h
      - Bridge/WebIFCBridge.mm
